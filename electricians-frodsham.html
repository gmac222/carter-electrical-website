      <h2>Frequently asked questions</h2>
      <h3>Are your electricians NICEIC-approved and qualified to work in Frodsham?</h3><p>Yes. Carter Electrical Contracting is a fully NICEIC-approved contractor, and every electrician dispatched to Frodsham works to BS 7671 (18th Edition, including the latest amendments). Certification is issued at handover on every job — EIC, minor works or EICR as appropriate — and logged against the property address so it's straightforward to retrieve if you need it for insurance, a landlord pack or a future sale.</p>
      <h3>What's your typical lead time for a new project in Frodsham?</h3><p>It depends on scope. A small domestic job — a replacement consumer unit, a few additional circuits, a single EV charger — we can usually schedule within a week or two of sign-off. A larger commercial fit-out or industrial installation normally goes through a site visit, a detailed scope and a formal quote first, and we'll give you an honest date at that stage rather than overpromise. Our phone is answered during working hours by the same team that schedules the engineers, so you'll get a straight answer on timings.</p>
      <h3>Which Frodsham postcodes and neighbourhoods do you cover?</h3><p>We cover every postcode inside Frodsham and its surrounding villages — primarily WA6. That includes Kingsley, Helsby, Overton, Alvanley, Manley and the rest of the Cheshire West area. If you're unsure whether your address is in our usual radius, call us with the postcode and we'll confirm before scheduling.</p>
      <h3>Do you carry out EICRs and landlord electrical-safety reports in Frodsham?</h3><p>Yes. We're a go-to contractor for EICRs across Frodsham — both for commercial landlords ahead of lease renewals and for residential landlords meeting the five-yearly Electrical Safety Standards in the Private Rented Sector (England) Regulations 2020, or the equivalent Welsh legislation where applicable. Reports are issued as a signed PDF within 48 hours of the test, with remedial quotes broken out clearly so you can decide what's urgent.</p>
      <h3>Can you install an OZEV-approved EV charger at a home or business in Frodsham?</h3><p>Yes — we're OZEV-approved and install 7 kW single-phase and 22 kW three-phase chargers throughout Frodsham. For domestic installs we handle the DNO notification, load management (so your main supply doesn't get overloaded) and OLEV/EV-chargepoint grant paperwork where you're eligible. For workplace installs we can scope multi-bay back-office systems with RFID authorisation and billing integration.</p>
      <h3>Do you work on heritage, listed or conservation-area properties in Frodsham?</h3><p>Yes, and we do it often. Frodsham's older property stock needs a different hand — surface-clipped cable runs on stone walls, concealed containment through plasterwork, period-sympathetic switch and socket plates, and documentation that will satisfy both a conservation officer and the NICEIC.</p>
